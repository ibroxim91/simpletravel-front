version: '3.8'

services:
  nextjs:
    container_name: simple-travel-app
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://simple-travel.felixits.uz
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://simple-travel.felixits.uz
      - PORT=3000
      - HOSTNAME=0.0.0.0
    restart: unless-stopped
    env_file:
      - .env.production
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s