version: '3.8'

services:
  nextjs:
    container_name: simple-travel-app-dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    volumes:
      - ./src:/app/src
      - ./pages:/app/pages
      - /app/node_modules

    restart: unless-stopped
